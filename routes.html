<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Routes</title>
<script src="https://cdn.jsdelivr.net/npm/openseadragon@4.1/build/openseadragon/openseadragon.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: manipulation;
  }

  #osd {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    top: 0;
    z-index: 0;
    background: #000;
    pointer-events: auto;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
    touch-action: none;  /* we handle all touch ourselves */
    z-index: 2;
    background: transparent;
  }

  /* Title strip — menu-spacer | prev | title | next | menu in one row */
  #title-strip {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #000;
    padding-top: max(env(safe-area-inset-top, 0px), 20px);
    padding-bottom: 12px;
    padding-left: max(env(safe-area-inset-left, 0px), 16px);
    padding-right: max(env(safe-area-inset-right, 0px), 16px);
    display: flex;
    align-items: center;
    z-index: 5;
  }

  .nav-btn {
    flex: 0 0 72px;
    color: rgba(255,255,255,0.5);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding: 4px 0;
  }
  #btn-next { text-align: right; }
  .nav-btn:active { opacity: 0.4; }
  .nav-btn.hidden { visibility: hidden; }

  #btn-menu {
    display: inline-block;
    margin-left: 10px;
    color: rgba(255,255,255,0.75);
    font-size: 27px;
    line-height: 1;
    cursor: pointer;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    vertical-align: middle;
    position: relative;
    top: -2px;
  }
  #btn-menu.hidden { display: none; }
  #btn-menu:active { opacity: 0.4; }

  #activity-name {
    position: fixed;
    top: 0; left: 0;
    transform: translateX(-50%);
    white-space: nowrap;
    background: rgba(0,0,0,0.55);
    border-radius: 10px;
    padding: 3px 10px;
    color: rgba(255,255,255,0.9);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 14px;
    letter-spacing: 0.02em;
    pointer-events: none;
    z-index: 6;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  #miles-hud {
    position: fixed;
    bottom: max(env(safe-area-inset-bottom, 0px), 16px);
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    pointer-events: none;
    z-index: 6;
  }

  #dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    min-width: 160px;
    background: rgba(52,52,54,0.97);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }
  #dropdown a {
    display: block;
    padding: 13px 20px;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: normal;
    text-transform: none;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  #dropdown a:first-child { border-top: none; }
  #dropdown a:active { background: rgba(255,255,255,0.1); }

  #picker {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(52,52,54,0.97);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    padding: 10px;
    min-width: 252px;
    user-select: none;
    z-index: 10;
  }
  .picker-years {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: flex-start;
    padding: 2px 0;
  }
  .picker-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: normal;
    text-transform: none;
    color: rgba(255,255,255,0.8);
    padding: 9px 14px;
    cursor: pointer;
    border-radius: 7px;
    text-align: center;
  }
  .picker-btn:active { background: rgba(255,255,255,0.15); }
  .picker-btn.dim { color: rgba(255,255,255,0.22); cursor: default; }
  .picker-months-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }
  .picker-month-header {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding-bottom: 8px;
  }
  .picker-back {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    padding: 2px 12px 2px 4px;
  }
  .picker-year-title {
    flex: 1;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.8);
    text-align: center;
    cursor: pointer;
    padding: 4px 0;
  }

  #title {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.75);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: auto;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Loading / error message */
  #msg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.4);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
  }
</style>

<div id="osd"></div>
<canvas id="c"></canvas>
<div id="title-strip">
  <div class="nav-btn hidden" id="btn-prev">&#8249; Prev</div>
  <div id="title">
    <span id="title-text"></span><span id="btn-menu" class="hidden">&#9662;</span>
    <div id="dropdown"></div>
    <div id="picker"></div>

  <div class="nav-btn hidden" id="btn-next">Next &#8250;</div>

<script>
const LAYOUT_PORTRAIT  = { w: 393, h: 710 };
const LAYOUT_LANDSCAPE = { w: 800, h: 400 };
const STROKE_CSS = 1.0;  // desired stroke in CSS pixels

// Brighten a hex color toward white by `amount` (0–1)
function brightenColor(hex, amount = 0.5) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.round(r + (255-r)*amount)},${Math.round(g + (255-g)*amount)},${Math.round(b + (255-b)*amount)})`;
}
const MAX_ZOOM   = 40;
const DATA_BASE  = 'https://pub-235ce3251fcb4a3091c119ca67daa0d9.r2.dev';
const IS_DEV     = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const LOCAL_BASE = 'http://localhost:8080';
const DZI_BASE     = IS_DEV ? LOCAL_BASE + '/data/dzi'     : DATA_BASE + '/data/dzi';
const LAYOUTS_BASE = IS_DEV ? LOCAL_BASE + '/data/layouts' : DATA_BASE + '/data/layouts';
const CANVAS_W   = 393;  // layout canvas width (portrait) — same as LAYOUT_PORTRAIT.w

function isLandscape() { return window.innerWidth > window.innerHeight; }
function layoutDims()  { return isLandscape() ? LAYOUT_LANDSCAPE : LAYOUT_PORTRAIT; }
function periodFile(period) {
  const suf = isLandscape() ? '-land' : '';
  return LAYOUTS_BASE + '/' + encodeURIComponent(period + suf) + '.json';
}
function cacheKey(period)   { return isLandscape() ? period + '-land' : period; }

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const W   = window.innerWidth;
  const H   = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
}
resize();
let _wasLandscape = isLandscape();
window.addEventListener('resize', () => {
  resize();
  const nowLandscape = isLandscape();
  if (nowLandscape !== _wasLandscape) {
    _wasLandscape = nowLandscape;
    resetView();
    loadPeriod(currentPeriod);   // load the other orientation's JSON
  } else {
    render(periodData);
  }
});

// ── State ─────────────────────────────────────────────────────────────────────
let index      = null;
let periodData = null;
let viewer     = null;

// ── URL param ─────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
let currentPeriod = params.get('period') || 'week';

// ── Current period helpers (computed from device clock, not stale server data) ─
const _now = new Date();
const CURRENT_MONTH = `${_now.getFullYear()}-${String(_now.getMonth() + 1).padStart(2, '0')}`;
const CURRENT_YEAR  = String(_now.getFullYear());

// ── Title ─────────────────────────────────────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];

function titleFor(period) {
  if (period === 'week')    return 'This Week';
  if (period === 'social') return 'Runs with Friends';
  if (period === 'hikes')  return 'Hikes';
  if (/^\d{4}-\d{2}$/.test(period)) {
    const [y, m] = period.split('-');
    return MONTH_NAMES[parseInt(m) - 1] + ' ' + y;
  }
  if (/^\d{4}$/.test(period)) return period;
  return period;
}

const milesHud = document.getElementById('miles-hud');
function setMiles(totalMiles, count) {
  if (!totalMiles) { milesHud.textContent = ''; return; }
  const label = currentPeriod === 'hikes' ? 'hikes' : 'runs';
  const countPart = count ? count.toLocaleString() + ' ' + label + ', ' : '';
  milesHud.textContent = countPart + Math.round(totalMiles).toLocaleString() + ' mi';
}

// ── Navigation ────────────────────────────────────────────────────────────────
function neighborPeriods(period) {
  if (!index) return { prev: null, next: null };
  if (period === 'social') return { prev: null, next: null };
  if (period === 'hikes')  return { prev: null, next: null };
  if (/^\d{4}-\d{2}$/.test(period)) {
    const list = index.months;
    const i = list.indexOf(period);
    return { prev: i >= 0 && i + 1 < list.length ? list[i + 1] : null,
             next: i > 0 ? list[i - 1] : null };
  }
  if (/^\d{4}$/.test(period)) {
    const list = index.years;
    const i = list.indexOf(period);
    return { prev: i >= 0 && i + 1 < list.length ? list[i + 1] : null,
             next: i > 0 ? list[i - 1] : null };
  }
  return { prev: null, next: null };
}

const dropdown    = document.getElementById('dropdown');
const btnMenu     = document.getElementById('btn-menu');
const titleEl     = document.getElementById('title');
const titleTextEl = document.getElementById('title-text');
const pickerEl    = document.getElementById('picker');

function closeDropdown() { dropdown.style.display = ''; }
function openDropdown()  { dropdown.style.display = 'block'; }
function closePicker()   { pickerEl.style.display = ''; }

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function buildPickerYears() {
  pickerEl.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'picker-years';
  for (const y of [...index.years].reverse()) {
    const btn = document.createElement('div');
    btn.className = 'picker-btn';
    btn.textContent = y;
    btn.addEventListener('click', e => { e.stopPropagation(); buildPickerMonths(y); });
    grid.appendChild(btn);
  }
  pickerEl.appendChild(grid);
}

function buildPickerMonths(year) {
  pickerEl.innerHTML = '';

  const header = document.createElement('div');
  header.className = 'picker-month-header';
  const back = document.createElement('div');
  back.className = 'picker-back';
  back.textContent = '‹';
  back.addEventListener('click', e => { e.stopPropagation(); buildPickerYears(); });
  const yearTitle = document.createElement('div');
  yearTitle.className = 'picker-year-title';
  yearTitle.textContent = 'All ' + year;
  yearTitle.addEventListener('click', e => { e.stopPropagation(); closePicker(); navigate(year); });
  header.appendChild(back);
  header.appendChild(yearTitle);
  pickerEl.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'picker-months-grid';
  for (let m = 1; m <= 12; m++) {
    const key = year + '-' + String(m).padStart(2, '0');
    const has = index.months.includes(key);
    const btn = document.createElement('div');
    btn.className = 'picker-btn' + (has ? '' : ' dim');
    btn.textContent = MONTHS_SHORT[m - 1];
    if (has) btn.addEventListener('click', e => { e.stopPropagation(); closePicker(); navigate(key); });
    grid.appendChild(btn);
  }
  pickerEl.appendChild(grid);
}

function openPicker() {
  if (!index) return;
  closeDropdown();
  buildPickerYears();
  pickerEl.style.display = 'block';
}

titleTextEl.addEventListener('click', e => {
  e.stopPropagation();
  pickerEl.style.display === 'block' ? closePicker() : openPicker();
});
btnMenu.addEventListener('click', e => {
  e.stopPropagation();
  if (dropdown.style.display === 'block') { closeDropdown(); return; }
  closePicker();
  openDropdown();
});
document.addEventListener('pointerdown', e => {
  if (!titleEl.contains(e.target)) { closeDropdown(); closePicker(); }
});
canvas.addEventListener('pointerdown', e => {
  closeDropdown(); closePicker();
}, { capture: true });

function buildDropdown() {
  dropdown.innerHTML = '';
  const items = [
    { label: 'Progress',     href: 'index.html' },
    { label: 'This Month',   period: CURRENT_MONTH },
    { label: 'This Year',    period: CURRENT_YEAR },
    { label: 'Lifetime',     href: 'planet.html' },
    { label: 'With Friends', period: 'social' },
    { label: 'Hikes',        period: 'hikes' },
  ];
  for (const item of items) {
    if (!item.href && !item.period) continue;  // skip if index not loaded yet
    const a = document.createElement('a');
    a.textContent = item.label;
    if (item.href) {
      a.href = item.href;
      a.addEventListener('click', e => { e.stopPropagation(); });
    } else {
      a.href = '#';
      a.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); closeDropdown(); navigate(item.period); });
    }
    dropdown.appendChild(a);
  }
}

function updateNav() {
  const { prev, next } = neighborPeriods(currentPeriod);
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  btnPrev.className = 'nav-btn' + (prev ? '' : ' hidden');
  btnNext.className = 'nav-btn' + (next ? '' : ' hidden');
  btnPrev.onclick = prev ? () => navigate(prev) : null;
  btnNext.onclick = next ? () => navigate(next) : null;

  btnMenu.className = '';
  buildDropdown();
}

function navigate(period) {
  closeDropdown();
  closePicker();
  setZoomedActivity(null);
  currentPeriod = period;
  history.replaceState(null, '', '?period=' + encodeURIComponent(period));
  const cached = periodCache[cacheKey(period)];
  document.getElementById('title-text').textContent = titleFor(period);
  setMiles(cached && cached.total_miles, cached && cached.activities && cached.activities.length);
  updateNav();
  resetView();
  loadPeriod(period);
}

// ── Zoom / pan state ──────────────────────────────────────────────────────────
let userZoom = 1, userPanX = 0, userPanY = 0;
let lastZoomedId = null;  // activity zoomed into on last click; next click on same activity navigates
const activityNameEl = document.getElementById('activity-name');
function setZoomedActivity(id) {
  lastZoomedId = id;
  const act = id && periodData && periodData.activities.find(a => String(a.id) === id);
  activityNameEl.style.opacity = act ? '1' : '0';
  if (act) activityNameEl.textContent = act.name;
}
function positionActivityName(pxPerLayout, originX, originY) {
  if (!lastZoomedId || !periodData) return;
  const act = periodData.activities.find(a => String(a.id) === lastZoomedId);
  if (!act) return;
  const mileFontPx = Math.min(24, 9 * pxPerLayout);
  activityNameEl.style.left = (act.dx * pxPerLayout + originX) + 'px';
  activityNameEl.style.top  = (act.dy * pxPerLayout + originY + mileFontPx / 2 + 8) + 'px';
}
let animFrameId = null;

function cancelAnim() {
  if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
}

function animateTo(toZoom, toPanX, toPanY, duration = 350) {
  cancelAnim();
  canvas.style.transform = '';
  const fromZoom = userZoom, fromPanX = userPanX, fromPanY = userPanY;
  const start = performance.now();
  function step(now) {
    const raw = Math.min(1, (now - start) / duration);
    const t   = 0.5 - 0.5 * Math.cos(Math.PI * raw);  // ease in-out
    userZoom = fromZoom + (toZoom  - fromZoom) * t;
    userPanX = fromPanX + (toPanX  - fromPanX) * t;
    userPanY = fromPanY + (toPanY  - fromPanY) * t;
    render(periodData);
    animFrameId = raw < 1 ? requestAnimationFrame(step) : null;
  }
  animFrameId = requestAnimationFrame(step);
}

function resetView() { userZoom = 1; userPanX = 0; userPanY = 0; canvas.style.transform = ''; setZoomedActivity(null); }

// Zoom by factor k, anchored at CSS point (px, py).
function zoomAround(k, px, py) {
  const z = Math.max(1, Math.min(MAX_ZOOM, userZoom * k));
  const actualK = z / userZoom;
  userPanX = userPanX * actualK + px * (1 - actualK);
  userPanY = userPanY * actualK + py * (1 - actualK);
  userZoom = z;
  if (k < 1) setZoomedActivity(null);
}

// ── Render ────────────────────────────────────────────────────────────────────
let lastFit = 1, lastOx = 0, lastOy = 0;
let renderedBboxes = [];   // [{id, minX, maxX, minY, maxY, dx, dy}] layout coords
let hoveredId  = null;
let pressedId  = null;   // activity finger/mouse is currently pressing
let pressStart = null;   // {x,y} at pointerdown, to detect drag before clearing pressedId

const LABEL_MIN_PX = 10;

// Draw all routes using the already-set ctx transform.
// pxPerLayout: screen pixels per layout unit (used for lineWidth scaling).
function drawRoutes(data, pxPerLayout) {
  const acts   = data.activities || [];
  const scale  = data.scale   || 1000;
  const cosLat = data.cos_lat || 0.674;

  const base     = layoutDims();
  const LAYOUT_W = data.canvas_w || base.w;
  const LAYOUT_H = data.canvas_h || base.h;

  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  renderedBboxes = [];

  for (const act of acts) {
    const pressed = act.id === pressedId;
    const hovered = act.id === hoveredId;
    const color   = (pressed || hovered) ? '#ffffff' : act.color;
    ctx.strokeStyle = color;
    ctx.lineWidth   = (pressed ? STROKE_CSS * 5 : hovered ? STROKE_CSS * 2 : STROKE_CSS) / pxPerLayout;

    let minX, maxX, minY, maxY;

    if (act.circle_radius != null) {
      // Untracked run: circle whose circumference equals the distance
      const r = act.circle_radius * scale;
      ctx.beginPath();
      ctx.arc(act.dx, act.dy, r, 0, 2 * Math.PI);
      ctx.stroke();
      minX = act.dx - r; maxX = act.dx + r;
      minY = act.dy - r; maxY = act.dy + r;
    } else {
      const pts = act.coords;
      if (!pts || pts.length < 2) continue;
      minX = Infinity; maxX = -Infinity; minY = Infinity; maxY = -Infinity;
      ctx.beginPath();
      let first = true;
      const actCosLat = act.cos_lat || cosLat;
      for (const [dlng, dlat] of pts) {
        const x = act.dx + dlng * scale * actCosLat;
        const y = act.dy - dlat * scale;
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
        if (first) { ctx.moveTo(x, y); first = false; }
        else         ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    renderedBboxes.push({ id: act.id, minX, maxX, minY, maxY, dx: act.dx, dy: act.dy });

    if (act.distance_mi != null && Math.min(maxX - minX, maxY - minY) * pxPerLayout >= LABEL_MIN_PX) {
      const fontSize = Math.min(24, 9 * pxPerLayout) / pxPerLayout;
      ctx.font = `500 ${fontSize}px -apple-system, sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.strokeStyle  = 'rgba(0,0,0,0.75)';
      ctx.lineWidth    = 3 / pxPerLayout;
      ctx.lineJoin     = 'round';
      ctx.strokeText(String(act.distance_mi), act.dx, act.dy);
      ctx.fillStyle    = color;
      ctx.fillText(String(act.distance_mi), act.dx, act.dy);
    }
  }

  if (acts.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = `500 ${15 / pxPerLayout}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('No runs recorded yet', LAYOUT_W / 2, LAYOUT_H / 2);
  }
}

function render(data) {
  if (!data) return;

  const dpr = window.devicePixelRatio || 1;
  const vw  = window.innerWidth;
  const vh  = window.innerHeight;

  const base = layoutDims();
  const LAYOUT_W = data.canvas_w || base.w;
  const LAYOUT_H = data.canvas_h || base.h;
  const topH  = document.getElementById('title-strip').getBoundingClientRect().height;
  const avail = vh - topH;
  const fit = Math.min(vw / LAYOUT_W, avail / LAYOUT_H);
  const ox  = (vw - LAYOUT_W * fit) / 2;
  const oy  = topH + (avail - LAYOUT_H * fit) / 2;
  lastFit = fit; lastOx = ox; lastOy = oy;

  // Clear the entire physical canvas first (covers letterbox regions too)
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Combined transform: fit-to-screen, then user zoom/pan
  const totalScale = dpr * fit * userZoom;
  const tx = (ox * userZoom + userPanX) * dpr;
  const ty = (oy * userZoom + userPanY) * dpr;
  ctx.setTransform(totalScale, 0, 0, totalScale, tx, ty);

  drawRoutes(data, fit * userZoom);
  positionActivityName(fit * userZoom, ox * userZoom + userPanX, oy * userZoom + userPanY);
}

// ── OSD-driven render ─────────────────────────────────────────────────────────
function renderFromOSD() {
  if (!periodData || !viewer || !viewer.isOpen()) {
    render(periodData);  // fallback to standalone canvas render
    return;
  }
  const vp     = viewer.viewport;
  const zoom   = vp.getZoom(true);
  const center = vp.getCenter(true);  // in OSD image coords (0..1 wide, 0..aspect tall)

  const container = viewer.container;
  const cw     = container.offsetWidth;
  const ch     = container.offsetHeight;
  const osdTop = container.getBoundingClientRect().top;

  // Pixels per layout unit: at OSD zoom=1, image fills cw px; image_width = layout canvas_w
  const layoutW     = periodData.canvas_w || layoutDims().w;
  const pxPerLayout = zoom * cw / layoutW;

  // Layout origin on full screen
  const tx = cw / 2 - center.x * layoutW * pxPerLayout;
  const ty = osdTop + ch / 2 - center.y * layoutW * pxPerLayout;

  const dpr = window.devicePixelRatio || 1;

  // Clear canvas
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.setTransform(pxPerLayout * dpr, 0, 0, pxPerLayout * dpr, tx * dpr, ty * dpr);

  drawRoutes(periodData, pxPerLayout);
  positionActivityName(pxPerLayout, tx, ty);
}

// ── OSD mode toggle ───────────────────────────────────────────────────────────
function setOSDMode(active) {
  canvas.style.pointerEvents = active ? 'none' : 'auto';
  document.getElementById('osd').style.display = active ? '' : 'none';
}

// ── OSD initialisation ────────────────────────────────────────────────────────
function dziKey(period) { return isLandscape() ? period + '-land' : period; }

function initOSD(period) {
  const key    = dziKey(period);
  const dziSrc = DZI_BASE + '/' + key + '/' + key + '.dzi';

  // Update OSD top to match title strip
  const topH = document.getElementById('title-strip').getBoundingClientRect().height;
  document.getElementById('osd').style.top = topH + 'px';

  if (viewer) {
    // Already open: just navigate to new DZI
    viewer.open(dziSrc);
    return;
  }

  viewer = OpenSeadragon({
    id: 'osd',
    tileSources: dziSrc,
    showNavigationControl: false,
    animationTime: 0.4,
    springStiffness: 8,
    minZoomLevel: 0.5,
    maxZoomPixelRatio: 1.1,
    gestureSettingsMouse:   { clickToZoom: false, dblClickToZoom: false },
    gestureSettingsTouch:   { clickToZoom: false, dblClickToZoom: false },
    gestureSettingsUnknown: { clickToZoom: false, dblClickToZoom: false },
  });

  // CSS translate optimisation: during a pan-only drag, move the canvas overlay
  // via GPU-composited CSS translate (no redraw) and commit with one render on pointer-up.
  // Same principle as the canvas-only drag path; delta in px = -Δcenter * zoom * cw.
  let osdPanDrag    = false;
  let osdDragCenter = null;  // OSD image-space center at last committed render
  let osdDragZoom   = null;  // OSD zoom at drag start

  let lastOSDZoom = null;
  viewer.addHandler('zoom', () => {
    const z = viewer.viewport.getZoom();
    if (lastOSDZoom !== null && z < lastOSDZoom) setZoomedActivity(null);
    lastOSDZoom = z;
  });

  viewer.addHandler('update-viewport', () => {
    if (osdPanDrag) {
      const zoom = viewer.viewport.getZoom(true);
      if (Math.abs(zoom - osdDragZoom) < 1e-6) {
        // Pan only — CSS translate, no canvas redraw
        const center = viewer.viewport.getCenter(true);
        const cw = viewer.container.offsetWidth;
        const dx = -(center.x - osdDragCenter.x) * zoom * cw;
        const dy = -(center.y - osdDragCenter.y) * zoom * cw;
        canvas.style.transform = `translate(${dx}px,${dy}px)`;
        return;
      }
    }
    // Zoom change or no drag: full redraw
    canvas.style.transform = '';
    renderFromOSD();
  });

  // Double-click / double-tap on OSD canvas → reset to home
  viewer.addHandler('canvas-double-click', () => {
    viewer.viewport.goHome(true);
  });

  // Single click on OSD canvas → handle route selection
  viewer.addHandler('canvas-click', event => {
    if (!event.quick) return;  // was a drag
    if (dropdown.style.display === 'block') { closeDropdown(); return; }
    // event.position is container-relative; convert to absolute screen coords
    const osdRect = viewer.container.getBoundingClientRect();
    handleCanvasClick(event.position.x + osdRect.left, event.position.y + osdRect.top);
  });

  // Press highlight on OSD canvas (touch + mouse)
  viewer.canvas.addEventListener('pointerdown', e => {
    if (!e.isPrimary) return;
    const hit = hitTestBboxes(e.clientX, e.clientY);
    pressedId  = hit ? hit.id : null;
    pressStart = { x: e.clientX, y: e.clientY };
    if (pressedId) renderFromOSD();
    osdPanDrag    = true;
    osdDragCenter = viewer.viewport.getCenter(true);
    osdDragZoom   = viewer.viewport.getZoom(true);
  });
  viewer.canvas.addEventListener('pointerup', e => {
    if (!e.isPrimary) return;
    if (pressedId) { pressedId = null; }
    if (osdPanDrag) {
      osdPanDrag = false;
      canvas.style.transform = '';
      renderFromOSD();
    }
  });
  viewer.canvas.addEventListener('pointercancel', e => {
    if (!e.isPrimary) return;
    osdPanDrag = false;
    canvas.style.transform = '';
    renderFromOSD();
  });
  viewer.canvas.addEventListener('pointermove', e => {
    if (pressedId && pressStart && Math.hypot(e.clientX - pressStart.x, e.clientY - pressStart.y) > 4) {
      pressedId  = null;
      pressStart = null;
    }
  });

  // Hover (desktop) on OSD canvas — suppress during drag to avoid spurious redraws
  viewer.canvas.addEventListener('mousemove', e => {
    if (osdPanDrag) return;
    handleHover(e.clientX, e.clientY);
  });
  viewer.canvas.addEventListener('mouseleave', () => {
    if (hoveredId !== null) { hoveredId = null; renderFromOSD(); }
  });
}

// ── Screen → layout coordinate transform ─────────────────────────────────────
function screenToLayout(cx, cy) {
  if (viewer && viewer.isOpen()) {
    const vp     = viewer.viewport;
    const zoom   = vp.getZoom(true);
    const center = vp.getCenter(true);
    const cw     = viewer.container.offsetWidth;
    const ch     = viewer.container.offsetHeight;
    const osdTop = viewer.container.getBoundingClientRect().top;
    const layoutW = (periodData && periodData.canvas_w) || CANVAS_W;
    const pxPerLayout = zoom * cw / layoutW;
    return {
      lx: (cx - cw / 2) / pxPerLayout + center.x * layoutW,
      ly: (cy - osdTop - ch / 2) / pxPerLayout + center.y * layoutW,
    };
  }
  // Fallback: original canvas-based transform
  return {
    lx: (cx - lastOx * userZoom - userPanX) / (lastFit * userZoom),
    ly: (cy - lastOy * userZoom - userPanY) / (lastFit * userZoom),
  };
}

// ── Pointer events (mouse + touch) ────────────────────────────────────────────
const activePointers = new Map();  // pointerId → {x, y}
let pinchStart = null;  // snapshot when 2nd finger went down — used for from-scratch zoom
let dragAnchor = null;  // {x, y, panX, panY} at drag start
let didDrag    = false; // suppresses click if we panned
let lastTapTime = 0;

canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size === 1) {
    cancelAnim();
    dragAnchor = { x: e.clientX, y: e.clientY, panX: userPanX, panY: userPanY };
    didDrag = false;
    pinchStart = null;
    const hit = hitTestBboxes(e.clientX, e.clientY);
    pressedId  = hit ? hit.id : null;
    pressStart = { x: e.clientX, y: e.clientY };
    if (pressedId) render(periodData);
  } else if (activePointers.size === 2) {
    const [a, b] = [...activePointers.values()];
    pinchStart = {
      mx0:   (a.x + b.x) / 2,
      my0:   (a.y + b.y) / 2,
      dist0: Math.hypot(b.x - a.x, b.y - a.y),
      panX:  userPanX,
      panY:  userPanY,
      zoom:  userZoom,
    };
    dragAnchor = null;
  }
});

canvas.addEventListener('pointermove', e => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size === 1 && dragAnchor) {
    const dx = e.clientX - dragAnchor.x;
    const dy = e.clientY - dragAnchor.y;
    if (!didDrag && Math.hypot(dx, dy) > 4) {
      didDrag = true;
      if (pressedId) { pressedId = null; render(periodData); }
    }
    if (didDrag) {
      userPanX = dragAnchor.panX + dx;
      userPanY = dragAnchor.panY + dy;
      // CSS translate — GPU composited, no canvas rasterization during drag
      canvas.style.transform = `translate(${dx}px,${dy}px)`;
    }
  } else if (activePointers.size === 2 && pinchStart && pinchStart.dist0 > 0) {
    const [a, b] = [...activePointers.values()];
    const mx1   = (a.x + b.x) / 2;
    const my1   = (a.y + b.y) / 2;
    const dist1 = Math.hypot(b.x - a.x, b.y - a.y);

    // Compute zoom and pan from scratch relative to pinch start — no drift.
    // Invariant: the layout point under the initial midpoint appears under
    // the current midpoint after the transform.
    const newZoom = Math.max(1, Math.min(MAX_ZOOM, pinchStart.zoom * dist1 / pinchStart.dist0));
    const actualK = newZoom / pinchStart.zoom;
    if (newZoom < userZoom) setZoomedActivity(null);
    userZoom = newZoom;
    userPanX = mx1 + actualK * (pinchStart.panX - pinchStart.mx0);
    userPanY = my1 + actualK * (pinchStart.panY - pinchStart.my0);
    render(periodData);
  }
});

canvas.addEventListener('pointerup', e => {
  // Clear press highlight
  if (pressedId) { pressedId = null; render(periodData); }
  // Double-tap → reset view (only for single-finger taps)
  if (activePointers.size === 1 && !didDrag) {
    const now = Date.now();
    if (now - lastTapTime < 300) { cancelAnim(); resetView(); render(periodData); }
    lastTapTime = now;
  }
  activePointers.delete(e.pointerId);
  if (activePointers.size === 0) {
    // Commit pan: re-render at correct position, clear CSS transform
    if (canvas.style.transform) { canvas.style.transform = ''; render(periodData); }
    dragAnchor = null;
    pinchStart = null;
  } else if (activePointers.size === 1) {
    // Pinch → single finger: re-anchor remaining pointer so pan doesn't jump
    pinchStart = null;
    canvas.style.transform = '';
    const [rem] = activePointers.values();
    dragAnchor = { x: rem.x, y: rem.y, panX: userPanX, panY: userPanY };
    didDrag = true;  // don't treat this as a tap
  }
});

canvas.addEventListener('pointercancel', e => {
  activePointers.delete(e.pointerId);
  if (activePointers.size === 0) { canvas.style.transform = ''; dragAnchor = null; pinchStart = null; }
});

// Scroll-wheel zoom (desktop)
// Use exponential scaling so trackpad micro-deltas feel smooth and mouse
// wheel coarse-deltas feel appropriately fast.  RAF-batch so multiple wheel
// events in one frame produce exactly one render.
let wheelRAF = null;
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const k = Math.exp(-e.deltaY * 0.004);
  zoomAround(k, e.clientX, e.clientY);
  if (!wheelRAF) wheelRAF = requestAnimationFrame(() => { render(periodData); wheelRAF = null; });
}, { passive: false });

// ── Hover highlight (desktop only) ────────────────────────────────────────────
function hitTestBboxes(cx, cy) {
  const { lx, ly } = screenToLayout(cx, cy);
  let best = null, bestArea = Infinity;
  for (const b of renderedBboxes) {
    if (lx >= b.minX && lx <= b.maxX && ly >= b.minY && ly <= b.maxY) {
      const area = (b.maxX - b.minX) * (b.maxY - b.minY);
      if (area < bestArea) { bestArea = area; best = b; }
    }
  }
  return best;
}

function handleHover(cx, cy) {
  const hit = hitTestBboxes(cx, cy);
  const newId = hit ? hit.id : null;
  const cursorTarget = (viewer && viewer.isOpen()) ? viewer.canvas : canvas;
  cursorTarget.style.cursor = newId ? 'pointer' : 'default';
  if (newId !== hoveredId) {
    hoveredId = newId;
    if (viewer && viewer.isOpen()) renderFromOSD();
    else render(periodData);
  }
}

canvas.addEventListener('mousemove', e => {
  if (activePointers.size > 0) return;  // ignore during touch/drag
  handleHover(e.clientX, e.clientY);
});

canvas.addEventListener('mouseleave', () => {
  canvas.style.cursor = 'default';
  if (hoveredId !== null) {
    hoveredId = null;
    if (viewer && viewer.isOpen()) renderFromOSD();
    else render(periodData);
  }
});

// ── Click → zoom-to-fit or Strava ─────────────────────────────────────────────
function handleCanvasClick(cx, cy) {
  if (!renderedBboxes.length) return;

  const { lx, ly } = screenToLayout(cx, cy);

  // Smallest bbox containing the click
  let best = null, bestArea = Infinity;
  for (const b of renderedBboxes) {
    if (lx >= b.minX && lx <= b.maxX && ly >= b.minY && ly <= b.maxY) {
      const area = (b.maxX - b.minX) * (b.maxY - b.minY);
      if (area < bestArea) { bestArea = area; best = b; }
    }
  }

  // Fallback: nearest center
  if (!best) {
    let minDist = Infinity;
    for (const b of renderedBboxes) {
      const d = (lx - b.dx) ** 2 + (ly - b.dy) ** 2;
      if (d < minDist) { minDist = d; best = b; }
    }
  }

  if (!best) return;

  if (viewer && viewer.isOpen()) {
    // OSD mode: use OSD viewport navigation
    const rw = Math.max(best.maxX - best.minX, 0.001);
    const rh = Math.max(best.maxY - best.minY, 0.001);
    const rcx = (best.minX + best.maxX) / 2;
    const rcy = (best.minY + best.maxY) / 2;

    const cw = viewer.container.offsetWidth;
    const ch = viewer.container.offsetHeight;
    const layoutW = (periodData && periodData.canvas_w) || CANVAS_W;

    // Navigate to Strava if this activity was already zoomed into on the
    // previous click, regardless of current zoom level. This handles both
    // mid-animation clicks and edge cases where OSD's achieved zoom falls
    // just short of the 80% threshold.
    if (best.id === lastZoomedId) {
      setZoomedActivity(null);
      location.href = 'https://www.strava.com/activities/' + best.id;
    } else {
      // Convert target layout bbox center to OSD viewport coords
      const rcx_vp = rcx / layoutW;
      const rcy_vp = rcy / layoutW;  // OSD uses square aspect (divide by layoutW not layoutH)
      // Target OSD zoom: want route bbox to fill ~80% of screen
      const targetZoom_osd = Math.min(
        0.8 * layoutW / rw,
        0.8 * layoutW / (rh * cw / ch)  // account for aspect ratio
      );
      setZoomedActivity(best.id);
      viewer.viewport.panTo(new OpenSeadragon.Point(rcx_vp, rcy_vp), false);
      viewer.viewport.zoomTo(Math.max(viewer.viewport.getMinZoom(), targetZoom_osd), null, false);
    }
    return;
  }

  // Non-OSD (canvas-only) mode
  const topH  = document.getElementById('title-strip').getBoundingClientRect().height;
  const vw    = window.innerWidth;
  const avail = window.innerHeight - topH;

  if (best.id === lastZoomedId) {
    setZoomedActivity(null);
    location.href = 'https://www.strava.com/activities/' + best.id;
  } else {
    // Zoom to fill ~80% of available space, centred on the route
    const rw = Math.max(best.maxX - best.minX, 0.001);
    const rh = Math.max(best.maxY - best.minY, 0.001);
    const targetZoom = Math.max(1, Math.min(MAX_ZOOM,
      Math.min(0.8 * vw / (rw * lastFit), 0.8 * avail / (rh * lastFit))
    ));
    const rcx = (best.minX + best.maxX) / 2;
    const rcy = (best.minY + best.maxY) / 2;
    const toPanX = vw / 2           - targetZoom * (rcx * lastFit + lastOx);
    const toPanY = topH + avail / 2 - targetZoom * (rcy * lastFit + lastOy);
    setZoomedActivity(best.id);
    animateTo(targetZoom, toPanX, toPanY);
  }
}

canvas.addEventListener('click', e => {
  if (dropdown.style.display === 'block') { closeDropdown(); return; }
  if (didDrag) { didDrag = false; return; }
  handleCanvasClick(e.clientX, e.clientY);
});

// ── Data loading ──────────────────────────────────────────────────────────────
const periodCache = {};

function loadPeriod(period) {
  const key  = cacheKey(period);
  const file = periodFile(period);
  if (periodCache[key]) {
    periodData = periodCache[key];
    const dziSrc = DZI_BASE + '/' + dziKey(period) + '/' + dziKey(period) + '.dzi';
    fetch(dziSrc, { method: 'HEAD' })
      .then(r => {
        if (r.ok) { setOSDMode(true); initOSD(period); }
        else       { setOSDMode(false); render(periodData); }
      })
      .catch(() => { setOSDMode(false); render(periodData); });
    return;
  }
  document.getElementById('msg').style.display = '';
  document.getElementById('msg').textContent = 'Loading\u2026';
  fetch(file)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      periodCache[key] = data;
      periodData = data;
      document.getElementById('msg').style.display = 'none';
      document.getElementById('title-text').textContent = titleFor(period);
      setMiles(data.total_miles, data.activities && data.activities.length);
      const dziSrc = DZI_BASE + '/' + dziKey(period) + '/' + dziKey(period) + '.dzi';
      fetch(dziSrc, { method: 'HEAD' })
        .then(r => {
          if (r.ok) { setOSDMode(true); initOSD(period); }
          else       { setOSDMode(false); render(data); }
        })
        .catch(() => { setOSDMode(false); render(data); });
    })
    .catch(err => {
      document.getElementById('msg').textContent = 'Could not load routes.';
      console.error(err);
    });
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
fetch(LAYOUTS_BASE + '/index.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    index = data;
    if (currentPeriod === 'month') currentPeriod = CURRENT_MONTH;
    if (currentPeriod === 'year')  currentPeriod = CURRENT_YEAR;
    document.getElementById('title-text').textContent = titleFor(currentPeriod);
    updateNav();
    loadPeriod(currentPeriod);
  })
  .catch(err => {
    document.getElementById('msg').textContent = 'Could not load routes.';
    console.error(err);
  });
</script>
