name: Render Social DZI
on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libvips
          pip install git+https://github.com/davidgedye/boxcraft.git@v0.2.0 pyvips Pillow opencv-python-headless numpy mediapipe

      - name: Download social layouts and photos from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          mkdir -p data/layouts data/photos
          aws s3 cp s3://strava-data/data/layouts/social.json      data/layouts/social.json      --endpoint-url $R2_ENDPOINT
          aws s3 cp s3://strava-data/data/layouts/social-land.json data/layouts/social-land.json --endpoint-url $R2_ENDPOINT
          python3 - <<'PYEOF'
          import json, os, subprocess
          from concurrent.futures import ThreadPoolExecutor
          R2 = os.environ['R2_ENDPOINT']
          ids = set()
          for f in ('data/layouts/social.json', 'data/layouts/social-land.json'):
              for act in json.load(open(f)).get('activities', []):
                  ids.add(str(act['id']))
          print(f'Downloading {len(ids)} photos...')
          def dl(pid):
              out = f'data/photos/{pid}.jpg'
              if os.path.exists(out): return
              subprocess.run(['aws', 's3', 'cp', f's3://strava-data/data/photos/{pid}.jpg', out,
                              '--endpoint-url', R2], capture_output=True)
          with ThreadPoolExecutor(max_workers=20) as pool:
              pool.map(dl, ids)
          have = sum(1 for pid in ids if os.path.exists(f'data/photos/{pid}.jpg'))
          print(f'Downloaded {have}/{len(ids)} photos.')
          PYEOF

      - name: Render social DZI (portrait + landscape)
        run: |
          python3 render_dzi.py --period social --photos-dir data/photos --scale 20
          python3 render_dzi.py --period social --photos-dir data/photos --landscape --scale 15

      - name: Upload social DZI to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws configure set default.s3.max_concurrent_requests 50
          aws configure set default.s3.multipart_threshold 8MB
          aws configure set default.s3.max_queue_size 10000
          aws s3 sync data/dzi/social/      s3://strava-data/data/dzi/social/      --delete --endpoint-url $R2_ENDPOINT
          aws s3 sync data/dzi/social-land/ s3://strava-data/data/dzi/social-land/ --delete --endpoint-url $R2_ENDPOINT
          echo "Done."
