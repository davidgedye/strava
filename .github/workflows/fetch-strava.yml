name: Fetch Strava Data
# Fetches running data from Strava API daily

on:
  schedule:
    - cron: "0 21 * * *"  # 1pm Pacific (approx)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Strava data
        id: fetch
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: bash fetch-strava.sh

      - name: Update refresh token secret if rotated
        if: steps.fetch.outputs.NEW_REFRESH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set STRAVA_REFRESH_TOKEN --body "${{ steps.fetch.outputs.NEW_REFRESH_TOKEN }}"

      - name: Update history data
        env:
          ACCESS_TOKEN: ${{ steps.fetch.outputs.ACCESS_TOKEN }}
        run: python3 incremental_update.py data/history

      - name: Compute route layouts
        run: python3 compute_layout.py data/history data/layouts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/strava.json data/history/ data/layouts/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update Strava data"
          git push
