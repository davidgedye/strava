name: Update If New
# Checks for new Strava activities three times daily; if found, fetches, processes, and publishes them

on:
  schedule:
    - cron: "0 18 * * *"  # 10am PST (UTC-8)
    - cron: "0 20 * * *"  # Noon PST (UTC-8)
    - cron: "0 2 * * *"   # 6pm PST (UTC-8)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_activities: ${{ steps.check.outputs.new_activities }}
    steps:
      - name: Check for new Strava activities
        id: check
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          TOKEN_RESPONSE=$(curl -sf -X POST "https://www.strava.com/oauth/token" \
            -d "client_id=$STRAVA_CLIENT_ID" \
            -d "client_secret=$STRAVA_CLIENT_SECRET" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=$STRAVA_REFRESH_TOKEN")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          NEW_REFRESH_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.refresh_token')

          if [[ -z "$ACCESS_TOKEN" || "$ACCESS_TOKEN" == "null" ]]; then
            echo "Error: Failed to obtain access token" >&2
            exit 1
          fi

          if [[ "$NEW_REFRESH_TOKEN" != "$STRAVA_REFRESH_TOKEN" && "$NEW_REFRESH_TOKEN" != "null" ]]; then
            echo "new_refresh_token=$NEW_REFRESH_TOKEN" >> "$GITHUB_OUTPUT"
          fi

          KNOWN_IDS=$(aws s3 cp s3://strava-data/data/history/activity-index.json - \
            --endpoint-url "$R2_ENDPOINT" 2>/dev/null | jq -r 'keys[]' || true)

          RECENT_IDS=$(curl -sf -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://www.strava.com/api/v3/athlete/activities?per_page=5" | jq -r '.[].id | tostring')

          NEW_ACTIVITIES=false
          while IFS= read -r id; do
            if [[ -n "$id" ]] && ! echo "$KNOWN_IDS" | grep -qx "$id"; then
              NEW_ACTIVITIES=true
              break
            fi
          done <<< "$RECENT_IDS"

          echo "new_activities=$NEW_ACTIVITIES" >> "$GITHUB_OUTPUT"
          echo "New activities found: $NEW_ACTIVITIES"

      - name: Update refresh token secret if rotated
        if: steps.check.outputs.new_refresh_token
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set STRAVA_REFRESH_TOKEN --body "${{ steps.check.outputs.new_refresh_token }}"

  fetch:
    needs: check
    if: needs.check.outputs.new_activities == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq libvips
          pip install git+https://github.com/davidgedye/boxcraft.git@v0.2.0 pyvips Pillow opencv-python-headless numpy mediapipe

      - name: Download processed Strava data from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          mkdir -p data/history data/layouts data/photos data/dzi
          aws s3 sync s3://strava-data/data/history/ data/history/ --endpoint-url "$R2_ENDPOINT"
          aws s3 sync s3://strava-data/data/layouts/ data/layouts/ --endpoint-url "$R2_ENDPOINT"

      - name: Fetch fresh Strava data
        id: fetch
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: bash fetch-strava.sh

      - name: Update history data
        env:
          ACCESS_TOKEN: ${{ steps.fetch.outputs.ACCESS_TOKEN }}
        run: python3 incremental_update.py data/history

      - name: Compute route layouts
        run: python3 compute_layout.py data/history data/layouts

      - name: Download photos for DZI periods
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          python3 - <<'PYEOF'
          import datetime, json, os, subprocess
          from concurrent.futures import ThreadPoolExecutor

          R2_ENDPOINT = os.environ['R2_ENDPOINT']
          now         = datetime.datetime.now()
          year_key    = str(now.year)
          month_key   = now.strftime('%Y-%m')

          dzi_periods = [year_key, month_key, 'week']

          def r2_get_field(layout_key, field):
              r = subprocess.run(
                  ['aws', 's3', 'cp', f's3://strava-data/data/layouts/{layout_key}.json', '-',
                   '--endpoint-url', R2_ENDPOINT],
                  capture_output=True, text=True)
              if r.returncode != 0:
                  return -1
              try:
                  return json.loads(r.stdout).get(field, -1)
              except Exception:
                  return -1

          # Check social
          new_fc = json.load(open('data/layouts/social.json')).get('friend_count', 0)
          old_fc = r2_get_field('social', 'friend_count')
          render_social = new_fc != old_fc
          print(f'Social friend_count: old={old_fc} new={new_fc} → render={render_social}')
          if render_social:
              dzi_periods.append('social')

          # Check hikes
          try:
              new_hc = json.load(open('data/layouts/hikes.json')).get('hike_count', 0)
          except FileNotFoundError:
              new_hc = 0
          old_hc = r2_get_field('hikes', 'hike_count')
          render_hikes = new_hc != old_hc
          print(f'Hikes hike_count: old={old_hc} new={new_hc} → render={render_hikes}')
          if render_hikes:
              dzi_periods.append('hikes')

          # Pass render decisions to subsequent steps
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'RENDER_SOCIAL={"true" if render_social else "false"}\n')
              f.write(f'RENDER_HIKES={"true" if render_hikes else "false"}\n')

          # Collect photo IDs from portrait layout files (same IDs as landscape)
          photo_ids = set()
          for period in dzi_periods:
              layout_file = f'data/layouts/{period}.json'
              if os.path.exists(layout_file):
                  for act in json.load(open(layout_file)).get('activities', []):
                      photo_ids.add(str(act['id']))

          print(f'Downloading up to {len(photo_ids)} photos for periods: {dzi_periods}')

          def download(photo_id):
              out = f'data/photos/{photo_id}.jpg'
              if os.path.exists(out):
                  return  # already fetched by incremental_update
              subprocess.run(
                  ['aws', 's3', 'cp', f's3://strava-data/data/photos/{photo_id}.jpg', out,
                   '--endpoint-url', R2_ENDPOINT],
                  capture_output=True)

          with ThreadPoolExecutor(max_workers=20) as pool:
              pool.map(download, photo_ids)

          downloaded = sum(1 for pid in photo_ids if os.path.exists(f'data/photos/{pid}.jpg'))
          print(f'Downloaded {downloaded}/{len(photo_ids)} photos.')
          PYEOF

      - name: Render DZI for current periods
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%Y-%m)
          for PERIOD in "$YEAR" "$MONTH" week; do
            python3 render_dzi.py --period "$PERIOD" --photos-dir data/photos
            python3 render_dzi.py --period "$PERIOD" --photos-dir data/photos --landscape
          done

          if [[ "$RENDER_SOCIAL" == "true" ]]; then
            echo "friend_count changed — re-rendering social DZI"
            python3 render_dzi.py --period social --photos-dir data/photos --scale 20
            python3 render_dzi.py --period social --photos-dir data/photos --scale 15 --landscape
          else
            echo "friend_count unchanged — skipping social DZI render"
          fi

          if [[ "$RENDER_HIKES" == "true" ]]; then
            echo "hike_count changed — re-rendering hikes DZI"
            python3 render_dzi.py --period hikes --photos-dir data/photos --scale 20
            python3 render_dzi.py --period hikes --photos-dir data/photos --scale 15 --landscape
          else
            echo "hike_count unchanged — skipping hikes DZI render"
          fi

      - name: Upload data to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws configure set default.s3.max_concurrent_requests 50
          aws configure set default.s3.multipart_threshold 8MB
          aws configure set default.s3.max_queue_size 10000
          aws s3 sync data/ s3://strava-data/data/ --endpoint-url "$R2_ENDPOINT"
