name: Surgical Update
# Recomputes layouts and DZI for only the periods affected by changes to specific
# activities. Always re-fetches the latest data (GPS track + photo) from Strava.
#
# For type changes (e.g. Run→Hike), supply previous_types so the old-type periods
# are also recomputed alongside the new ones.

on:
  workflow_dispatch:
    inputs:
      activity_ids:
        description: 'Comma-separated Strava activity IDs'
        required: true
      previous_types:
        description: 'Previous activity types (required when type changed, parallel to activity_ids)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq libvips
          pip install pyvips Pillow opencv-python-headless numpy mediapipe

      - name: Re-fetch activity data from Strava
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          mkdir -p data/history data/photos data/layouts
          ACCESS_TOKEN=$(python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.parse
          data = urllib.parse.urlencode({
              'client_id':     os.environ['STRAVA_CLIENT_ID'],
              'client_secret': os.environ['STRAVA_CLIENT_SECRET'],
              'refresh_token': os.environ['STRAVA_REFRESH_TOKEN'],
              'grant_type':    'refresh_token',
          }).encode()
          req = urllib.request.Request('https://www.strava.com/oauth/token', data=data)
          with urllib.request.urlopen(req) as resp:
              print(json.loads(resp.read())['access_token'])
          PYEOF
          )
          # Re-fetches GPS track, photo, and with_friends classification from Strava
          ACCESS_TOKEN="$ACCESS_TOKEN" python3 backfill_activities.py \
            --force-ids "${{ inputs.activity_ids }}" \
            --history data/history \
            --photos  data/photos

      - name: Determine affected periods
        run: |
          set -eo pipefail
          PREV_TYPES_ARG=""
          if [[ -n "${{ inputs.previous_types }}" ]]; then
            PREV_TYPES_ARG="--previous-types ${{ inputs.previous_types }}"
          fi
          python3 affected_periods.py \
            --ids "${{ inputs.activity_ids }}" \
            --history data/history \
            $PREV_TYPES_ARG \
            | tee /tmp/affected_manifest.json
          echo "Periods: $(python3 -c "import json; print(json.load(open('/tmp/affected_manifest.json'))['layout_periods'])")"

      - name: Download targeted history from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          python3 - <<'PYEOF'
          import datetime, json, os, subprocess

          manifest     = json.load(open('/tmp/affected_manifest.json'))
          periods      = manifest['layout_periods']
          endpoint     = os.environ['R2_ENDPOINT']
          activity_ids = [i.strip() for i in '${{ inputs.activity_ids }}'.split(',') if i.strip()]

          # Exclude files already written by backfill so we don't overwrite fresh data
          excludes = [arg for act_id in activity_ids for arg in ('--exclude', f'*{act_id}.json')]

          def s3_sync(src, dst):
              subprocess.run(
                  ['aws', 's3', 'sync', src, dst, '--endpoint-url', endpoint] + excludes,
                  check=True)

          needs_all = any(p in ('social', 'hikes') for p in periods)
          if needs_all:
              print('Downloading all history (social/hikes period affected)...')
              s3_sync('s3://strava-data/data/history/', 'data/history/')
          else:
              years = set()
              now_year = str(datetime.datetime.now().year)
              for p in periods:
                  if p == 'week':
                      years.add(now_year)
                  elif '-' in p:
                      years.add(p.split('-')[0])
                  else:
                      years.add(p)  # bare year key
              for year in sorted(years):
                  print(f'Downloading history/{year}/...')
                  s3_sync(f's3://strava-data/data/history/{year}/', f'data/history/{year}/')
          PYEOF

      - name: Recompute affected layouts
        run: |
          PERIODS=$(python3 -c "
          import json
          m = json.load(open('/tmp/affected_manifest.json'))
          print(','.join(m['layout_periods']))
          ")
          if [[ -z "$PERIODS" ]]; then
            echo "No layout periods to recompute."
          else
            echo "Recomputing: $PERIODS"
            python3 compute_layout.py data/history data/layouts --only-periods="$PERIODS"
          fi

      - name: Download photos for affected periods
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          from concurrent.futures import ThreadPoolExecutor

          R2_ENDPOINT  = os.environ['R2_ENDPOINT']
          manifest     = json.load(open('/tmp/affected_manifest.json'))
          activity_ids = set('${{ inputs.activity_ids }}'.split(','))  # already fetched by backfill

          # Collect IDs from freshly-computed layout files
          photo_ids = set()
          for period in manifest['dzi_periods']:
              layout_file = f'data/layouts/{period}.json'
              if os.path.exists(layout_file):
                  for act in json.load(open(layout_file)).get('activities', []):
                      photo_ids.add(str(act['id']))

          # Skip IDs already downloaded by backfill (but still try — backfill may have failed)
          print(f'Downloading up to {len(photo_ids)} photos for affected periods...')

          def download_photo(photo_id):
              out = f'data/photos/{photo_id}.jpg'
              if os.path.exists(out):
                  return  # already present (backfill downloaded it)
              subprocess.run(
                  ['aws', 's3', 'cp', f's3://strava-data/data/photos/{photo_id}.jpg', out,
                   '--endpoint-url', R2_ENDPOINT],
                  capture_output=True)

          with ThreadPoolExecutor(max_workers=20) as pool:
              pool.map(download_photo, photo_ids)

          downloaded = sum(1 for pid in photo_ids if os.path.exists(f'data/photos/{pid}.jpg'))
          print(f'Downloaded {downloaded}/{len(photo_ids)} photos.')
          PYEOF

      - name: Re-render DZI for affected periods
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys

          with open('/tmp/affected_manifest.json') as f:
              manifest = json.load(f)

          dzi_periods = manifest['dzi_periods']
          if not dzi_periods:
              print("No DZI periods to render.")
              sys.exit(0)

          FIXED_SCALE = {'social': (20, 15), 'hikes': (20, 15)}

          for period in dzi_periods:
              portrait_scale, landscape_scale = FIXED_SCALE.get(period, (None, None))

              portrait_args  = ['--scale', str(portrait_scale)]  if portrait_scale  else []
              landscape_args = ['--scale', str(landscape_scale)] if landscape_scale else []

              print(f"\nRendering {period} (portrait)...")
              subprocess.run(
                  ['python3', 'render_dzi.py', '--period', period,
                   '--photos-dir', 'data/photos'] + portrait_args,
                  check=True)

              print(f"Rendering {period} (landscape)...")
              subprocess.run(
                  ['python3', 'render_dzi.py', '--period', period,
                   '--photos-dir', 'data/photos', '--landscape'] + landscape_args,
                  check=True)
          PYEOF

      - name: Upload affected data to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws configure set default.s3.max_concurrent_requests 50
          aws configure set default.s3.multipart_threshold 8MB
          aws configure set default.s3.max_queue_size 10000

          python3 - <<'PYEOF'
          import glob as _glob, json, os, subprocess

          R2_ENDPOINT = os.environ['R2_ENDPOINT']
          S3_BASE     = 's3://strava-data'

          def s3_cp(src, dst):
              subprocess.run(
                  ['aws', 's3', 'cp', src, dst, '--endpoint-url', R2_ENDPOINT],
                  check=True)

          def s3_sync(src, dst):
              subprocess.run(
                  ['aws', 's3', 'sync', src, dst, '--delete',
                   '--endpoint-url', R2_ENDPOINT],
                  check=True)

          with open('/tmp/affected_manifest.json') as f:
              manifest = json.load(f)

          activity_ids  = [i.strip() for i in '${{ inputs.activity_ids }}'.split(',') if i.strip()]
          layout_periods = manifest['layout_periods']
          dzi_periods    = manifest['dzi_periods']

          # Upload re-fetched history JSONs
          for act_id in activity_ids:
              for path in _glob.glob(f'data/history/**/{act_id}.json', recursive=True):
                  print(f'Uploading history: {path}')
                  s3_cp(path, f'{S3_BASE}/{path}')

          # Upload re-fetched photos (backfill may have downloaded a new one)
          for act_id in activity_ids:
              photo = f'data/photos/{act_id}.jpg'
              if os.path.exists(photo):
                  print(f'Uploading photo: {photo}')
                  s3_cp(photo, f'{S3_BASE}/{photo}')

          # Upload recomputed layout files (portrait + landscape)
          for p in layout_periods:
              for suffix in ('', '-land'):
                  key   = f'{p}{suffix}'
                  local = f'data/layouts/{key}.json'
                  if os.path.exists(local):
                      print(f'Uploading layout: {key}.json')
                      s3_cp(local, f'{S3_BASE}/data/layouts/{key}.json')

          # Upload re-rendered DZI directories (portrait + landscape)
          for p in dzi_periods:
              for suffix in ('', '-land'):
                  key       = f'{p}{suffix}'
                  local_dir = f'data/dzi/{key}'
                  if os.path.exists(local_dir):
                      print(f'Uploading DZI: {key}/')
                      s3_sync(local_dir + '/', f'{S3_BASE}/data/dzi/{key}/')

          print('Upload complete.')
          PYEOF
